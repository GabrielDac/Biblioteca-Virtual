name: Construir instaladores
 
on:
  push:
    tags:
      - 'v*'
 
permissions:
  contents: write
 
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''
 
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4
 
      - name: Instalar dependencias de Linux
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf
 
      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
 
      - name: Instalar Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
 
      - name: Caché de compilación
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
 
      - name: Instalar herramientas del proyecto
        run: npm install
 
      - name: Generar íconos de la aplicación
        run: npx tauri icon app-icon.png
 
      - name: Construir y publicar instaladores
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Biblioteca Virtual ${{ github.ref_name }}'
          releaseBody: |
            Instaladores de Biblioteca Virtual.
            - Mac: descargá el archivo .dmg
            - Windows: descargá el archivo .msi (o .exe)
            - Linux: descargá el .AppImage o el .deb
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
 
